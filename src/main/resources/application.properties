# App
spring.application.name=hackathon
server.port=8080

# H2 database (default for dev)
spring.datasource.url=jdbc:h2:mem:hackathon
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Actuator
management.endpoints.web.exposure.include=health,info

# LLM keys (from environment)
llm.gemini.key=${LLM_API_KEY:}
llm.groq.key=${GROQ_KEY:}

# LLM config
llm.provider=gemini
llm.gemini.model=gemini-3.5-flash
llm.gemini.url=https://generativelanguage.googleapis.com/v1beta/models
llm.groq.model=llama-3.1-8b-instant
llm.groq.url=https://api.groq.com/openai/v1
llm.timeout.seconds=15
llm.max.retries=2

# Logging
logging.level.com.zycus=DEBUG
logging.level.org.springframework.web=INFO