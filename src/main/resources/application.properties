# App
spring.application.name=hackathon
server.port=8080

# H2 database
spring.datasource.url=jdbc:h2:mem:hackathon;NON_KEYWORDS=USER
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate — CRUCIAL for data.sql timing
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true

# H2 console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# SQL init — always run data.sql
spring.sql.init.mode=always

# Actuator
management.endpoints.web.exposure.include=health,info

# LLM config
llm.provider=gemini
llm.api-key=${LLM_API_KEY:}
llm.model=gemini-3.5-flash
llm.base-url=https://generativelanguage.googleapis.com
llm.timeout.seconds=15
llm.max.retries=2

# Routing strategy — switchable at runtime
routing.strategy=ai

# Logging
logging.level.com.zycus=DEBUG
logging.level.org.springframework.web=INFO